name: release-please

# Runs on every push to main: release-please accumulates conventional commits
# into a single release PR (bumping the version and updating CHANGELOG.md).
# Merging that release PR is itself a push to main, so this runs once more to
# create the git tag and GitHub Release. workflow_dispatch is kept for manual
# re-runs (e.g. recovering a stuck release).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
